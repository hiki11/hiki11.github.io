//------------------------------------------------ 控制台添加绑键 -------------------------------------------------------------------------------
alias "BOT"   "exec showmenu; bind F5 bot_kick; bind F6 bot_add; bind F7 bot_place; bind F8 "toggle bot_crouch"; bind F9 "toggle bot_mimic 0 -1;""
alias "FOV"   "exec showmenu; bind V "toggle fov_cs_debug 0 30""
alias "CQ"    "exec showmenu; bind C noclip"
alias "QC"    "exec showmenu; exec QC"
alias "AG"    "exec showmenu; bind , "sv_rethrow_last_grenade""
alias "HD"    "exec showmenu; bind F2 "dao""
alias "BJ"    "exec showmenu; bind F1 "give item_assaultsuit""
alias "spawn" "exec spawn/spawn.cfg"
alias "unbindbindings" "exec showmenu; unbind f5; unbind v; unbind c; unbind .; unbind ,; unbind f2; unbind f1; echoln 清除成功！所有按键功能已清除。"
alias "default"  "exec Default.exe"
alias "showmenu" "exec showmenu"
alias "guide"    "exec guides_menu"
//------------------------------------------------------------------------------------------------------------------------------------------------

