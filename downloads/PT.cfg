//------------------------------------------------ 跑图模式参数 ---------------------------------------------------------------------------------
ammo_grenade_limit_total 5                           // 投掷物最大携带数量调整为 5 个
bot_kick                                             // 移除机器人
bot_stop 1                                           // 机器人静止
bot_join_after_player 1                              // BOT 在玩家后加入
bot_chatter 0                                        // 关闭 BOT 语音
cl_versus_intro 0                                    // 移除开场动画
mp_autokick 0                                        // 禁用自动踢出
sv_maxplayers 32                                     // 最大玩家数量调整为 32
mp_autoteambalance 0                                 // 禁用队伍不平衡
mp_buy_anywhere 1                                    // 随处可以购买
mp_buytime 9999999                                   // 购买时间无限
mp_ct_default_grenades "weapon_flashbang weapon_hegrenade weapon_smokegrenade weapon_incgrenade weapon_decoy" // CT 方自带道具
mp_death_drop_grenade 0                              // 死亡后不掉落投掷物
mp_death_drop_gun 1                                  // 死亡掉枪
mp_death_drop_defuser 0                              // 死亡不掉钳子
mp_drop_knife_enable 1                               // 允许丢弃刀
mp_free_armor 2                                      // 出生自带全甲
mp_freezetime 0                                      // 开局冻结时间为 0
mp_friendlyfire 0                                    // 禁用友伤
mp_ignore_round_win_conditions 1                     // 禁用胜利条件，不会结束游戏
mp_limitteams 10                                     // 队伍最大人数差为 10
mp_maxmoney 99999                                    // 最大金钱数 99999
mp_maxrounds 999999                                  // 最大回合数 999999
mp_respawn_on_death_ct 1                             // CT 死后允许复活
mp_respawn_on_death_t 1                              // T 死后允许复活
mp_respawnwavetime_ct 1                              // CT 复活时间为 1 秒
mp_respawnwavetime_t 1                               // T 复活时间为 1 秒
mp_roundtime 60                                      // 回合时间 60 分钟
mp_roundtime_defuse 60                               // 竞技模式回合时间 60 分钟
mp_roundtime_hostage 60                              // 人质模式回合时间 60 分钟
mp_solid_teammates 1                                 // 不允许穿过队友身体
mp_spectators_max 9                                  // 最大观察者 9 个
mp_startmoney 99999                                  // 初始金钱 99999
mp_t_default_grenades "weapon_flashbang weapon_hegrenade weapon_smokegrenade weapon_molotov weapon_decoy" // T 方自带道具
mp_t_default_primary weapon_ak47				 	 // T方默认长枪
mp_t_default_secondary weapon_deagle				 // T方默认手枪
mp_ct_default_primary weapon_m4a1				 	 // CT方默认长枪
mp_ct_default_secondary weapon_deagle				 // CT方默认手枪
mp_team_intro_time 0                                 // 跳过开局队伍动画
mp_weapons_allow_typecount -1                        // 无限购买武器
mp_warmup_end                                        // 结束热身
sv_alltalk 1                                         // 双方语言互通
sv_cheats 1                                          // 开启作弊
sv_falldamage_scale 0                                // 无摔落伤害
sv_grenade_trajectory_prac_pipreview 1               // 预览投掷物窗口
sv_grenade_trajectory_prac_trailtime 8               // 投掷物轨迹持续 8 秒
sv_grenade_trajectory_time_spectator 4               // 弹痕显示时长为 4 秒
sv_infinite_ammo 2                                   // 无限备弹
sv_regeneration_force_on 1                           // 自动回血
sv_showimpacts 1                                     // 显示服务器子弹碰撞判定箱
sv_showimpacts_time 5                                // 显示服务器子弹碰撞判定箱时间为 5 秒
mp_restartgame 1                                     // 重启房间
